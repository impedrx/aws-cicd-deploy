name: CI/CD Docker EC2

on:
  push:
    branches:
      - dev
      - staging
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Login no ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Definir tag da imagem
        id: tag
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "IMAGE_TAG=latest" >> $GITHUB_OUTPUT
          else
            echo "IMAGE_TAG=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Build da imagem
        run: docker build -t my-app .

      - name: Tag e Push pro ECR
        run: |
          IMAGE_TAG=${{ steps.tag.outputs.IMAGE_TAG }}
          docker tag my-app:latest 142280718316.dkr.ecr.us-east-2.amazonaws.com/pedrx12356:$IMAGE_TAG
          docker push 142280718316.dkr.ecr.us-east-2.amazonaws.com/pedrx12356:$IMAGE_TAG

  # ─────────────────────────────────────────────
  # Deploy automático quando há push na branch dev
  # ─────────────────────────────────────────────
  deploy-dev:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref_name == 'dev'

    steps:
      - name: Deploy na EC2 de Dev
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_DEV_HOST }}       # 🔧 CRIAR SECRET: IP da EC2 de dev
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region us-east-2 | \
              docker login --username AWS --password-stdin 142280718316.dkr.ecr.us-east-2.amazonaws.com
            docker pull 142280718316.dkr.ecr.us-east-2.amazonaws.com/pedrx12356:dev
            docker stop app || true
            docker rm app || true
            docker run -d -p 80:80 --name app 142280718316.dkr.ecr.us-east-2.amazonaws.com/pedrx12356:dev

  # ─────────────────────────────────────────────
  # Deploy automático quando há push na branch staging
  # ─────────────────────────────────────────────
  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref_name == 'staging'

    steps:
      - name: Deploy na EC2 de Staging
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_STAGING_HOST }}   # 🔧 CRIAR SECRET: IP da EC2 de staging
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region us-east-2 | \
              docker login --username AWS --password-stdin 142280718316.dkr.ecr.us-east-2.amazonaws.com
            docker pull 142280718316.dkr.ecr.us-east-2.amazonaws.com/pedrx12356:staging
            docker stop app || true
            docker rm app || true
            docker run -d -p 80:80 --name app 142280718316.dkr.ecr.us-east-2.amazonaws.com/pedrx12356:staging

  # ─────────────────────────────────────────────
  # Deploy automático quando há push na branch main (PRODUÇÃO)
  # ─────────────────────────────────────────────
  deploy-prod:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref_name == 'main'

    steps:
      - name: Deploy na EC2 de Produção
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_PROD_HOST }}      # 🔧 CRIAR SECRET: IP da EC2 de produção
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region us-east-2 | \
              docker login --username AWS --password-stdin 142280718316.dkr.ecr.us-east-2.amazonaws.com
            docker pull 142280718316.dkr.ecr.us-east-2.amazonaws.com/pedrx12356:latest
            docker stop app || true
            docker rm app || true
            docker run -d -p 80:80 --name app 142280718316.dkr.ecr.us-east-2.amazonaws.com/pedrx12356:latest

  # ─────────────────────────────────────────────
  # Instalação do Zabbix na EC2 dedicada de monitoramento
  # Roda apenas na main e somente se ainda não estiver instalado
  # ─────────────────────────────────────────────
  deploy-zabbix:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref_name == 'main'

    steps:
      - name: Instalar Zabbix na EC2 de Monitoramento
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_ZABBIX_HOST }}    # 🔧 CRIAR SECRET: IP da EC2 do Zabbix
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          script: |
            if systemctl is-active --quiet zabbix-server; then
              echo "Zabbix já instalado e rodando. Pulando instalação."
              exit 0
            fi

            set -e

            # Atualização do sistema
            sudo dnf update -y

            # Repositório oficial Zabbix 7.0 (Amazon Linux 2023 / RHEL 9)
            sudo rpm -Uvh https://repo.zabbix.com/zabbix/7.0/rhel/9/x86_64/zabbix-release-7.0-5.el9.noarch.rpm
            sudo dnf clean all

            # Instalação: Zabbix Server + Frontend + Agent
            sudo dnf install -y \
              zabbix-server-mysql \
              zabbix-web-mysql \
              zabbix-apache-conf \
              zabbix-sql-scripts \
              zabbix-selinux-policy \
              zabbix-agent2

            # Instalação: MariaDB
            sudo dnf install -y mariadb-server
            sudo systemctl start mariadb
            sudo systemctl enable mariadb

            # Criação do banco de dados Zabbix
            sudo mysql -uroot <<'SQL'
            CREATE DATABASE IF NOT EXISTS zabbix CHARACTER SET utf8mb4 COLLATE utf8mb4_bin;
            CREATE USER IF NOT EXISTS 'zabbix'@'localhost' IDENTIFIED BY '123456';
            GRANT ALL PRIVILEGES ON zabbix.* TO 'zabbix'@'localhost';
            SET GLOBAL log_bin_trust_function_creators = 1;
            SQL

            # Importação do schema inicial
            zcat /usr/share/zabbix-sql-scripts/mysql/server.sql.gz | \
              sudo mysql --default-character-set=utf8mb4 -uzabbix -p123456 zabbix

            # Desativa log_bin_trust_function_creators após importação
            sudo mysql -uroot -e "SET GLOBAL log_bin_trust_function_creators = 0;"

            # Configura senha do banco no Zabbix Server
            sudo sed -i 's/# DBPassword=/DBPassword=123456/' /etc/zabbix/zabbix_server.conf

            # Configura timezone para o frontend (Brasil)
            sudo sed -i 's/# php_value date.timezone Europe\/Riga/php_value date.timezone America\/Sao_Paulo/' \
              /etc/httpd/conf.d/zabbix.conf

            # Inicia e habilita todos os serviços
            sudo systemctl restart zabbix-server zabbix-agent2 httpd php-fpm
            sudo systemctl enable  zabbix-server zabbix-agent2 httpd php-fpm

            echo "Zabbix instalado com sucesso! Acesse: http://$(curl -s ifconfig.me)/zabbix"
