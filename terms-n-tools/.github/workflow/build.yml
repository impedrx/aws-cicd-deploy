name: CI/CD Docker EC2

on:
  push:
    branches:
      - dev
      - staging
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Login no ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Definir tag da imagem
        id: tag
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "IMAGE_TAG=latest" >> $GITHUB_OUTPUT
          else
            echo "IMAGE_TAG=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Build da imagem
        run: docker build -t my-app .

      - name: Tag e Push pro ECR
        run: |
          IMAGE_TAG=${{ steps.tag.outputs.IMAGE_TAG }}
          docker tag my-app:latest 142280718316.dkr.ecr.us-east-2.amazonaws.com/pedrx12356:$IMAGE_TAG
          docker push 142280718316.dkr.ecr.us-east-2.amazonaws.com/pedrx12356:$IMAGE_TAG

  # ─────────────────────────────────────────────
  # Deploy automático quando há push na branch dev
  # ─────────────────────────────────────────────
  deploy-dev:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref_name == 'dev'

    steps:
      - name: Deploy na EC2 de Dev
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_DEV_HOST }}       # 🔧 CRIAR SECRET: IP da EC2 de dev
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region us-east-2 | \
              docker login --username AWS --password-stdin 142280718316.dkr.ecr.us-east-2.amazonaws.com
            docker pull 142280718316.dkr.ecr.us-east-2.amazonaws.com/pedrx12356:dev
            docker stop app || true
            docker rm app || true
            docker run -d -p 80:80 --name app 142280718316.dkr.ecr.us-east-2.amazonaws.com/pedrx12356:dev

  # ─────────────────────────────────────────────
  # Deploy automático quando há push na branch staging
  # ─────────────────────────────────────────────
  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref_name == 'staging'

    steps:
      - name: Deploy na EC2 de Staging
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_STAGING_HOST }}   # 🔧 CRIAR SECRET: IP da EC2 de staging
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region us-east-2 | \
              docker login --username AWS --password-stdin 142280718316.dkr.ecr.us-east-2.amazonaws.com
            docker pull 142280718316.dkr.ecr.us-east-2.amazonaws.com/pedrx12356:staging
            docker stop app || true
            docker rm app || true
            docker run -d -p 80:80 --name app 142280718316.dkr.ecr.us-east-2.amazonaws.com/pedrx12356:staging

  # ─────────────────────────────────────────────
  # Deploy automático quando há push na branch main (PRODUÇÃO)
  # ─────────────────────────────────────────────
  deploy-prod:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref_name == 'main'

    steps:
      - name: Deploy na EC2 de Produção
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_PROD_HOST }}      # 🔧 CRIAR SECRET: IP da EC2 de produção
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region us-east-2 | \
              docker login --username AWS --password-stdin 142280718316.dkr.ecr.us-east-2.amazonaws.com
            docker pull 142280718316.dkr.ecr.us-east-2.amazonaws.com/pedrx12356:latest
            docker stop app || true
            docker rm app || true
            docker run -d -p 80:80 --name app 142280718316.dkr.ecr.us-east-2.amazonaws.com/pedrx12356:latest
