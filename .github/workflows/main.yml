name: CI/CD Docker EC2

on:
  push:
    branches:
      - main   # 🔧 MUDE se sua branch principal não for "main"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      # 🔐 Login na AWS (usa secrets do GitHub)
      - name: Configurar AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}        # 🔧 CRIAR SECRET
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }} # 🔧 CRIAR SECRET
          aws-region: us-east-2                                      # 🔧 CONFIRA SUA REGIÃO

      # 🔐 Login no ECR
      - name: Login no ECR
        uses: aws-actions/amazon-ecr-login@v2

      # 🐳 Build da imagem Docker
      - name: Build da imagem
        run: |
          docker build -t my-app .   # 🔧 Pode mudar o nome "my-app"

      # 🏷️ Tag da imagem (IMPORTANTE)
      - name: Tag da imagem
        run: |
          docker tag my-app:latest 142280718316.dkr.ecr.us-east-2.amazonaws.com/pedrx12356:latest
          # 🔧 TROCAR:
          # 142280718316 → seu AWS Account ID
          # us-east-2 → sua região
          # pedrx12356  → nome do seu repositório no ECR

      # 🚀 Push pro ECR
      - name: Push pro ECR
        run: |
          docker push 142280718316.dkr.ecr.us-east-2.amazonaws.com/pedrx12356:latest
          # 🔧 MESMA COISA DO PASSO ACIMA (tem que bater 100%)

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      # 🚀 Deploy via SSH na EC2
      - name: Deploy na EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 18.191.185.71                    # 🔧 IP DA SUA EC2
          username: ec2-user                   # 🔧 pode ser "ubuntu" dependendo da AMI
          key: ${{ secrets.EC2_SSH_KEY }}      # 🔧 CRIAR SECRET COM SUA .pem
          script: |
            # 🔄 Puxar nova imagem
            docker pull 142280718316.dkr.ecr.us-east-2.amazonaws.com/pedrx12356:latest

            # 🛑 Parar container antigo (se existir)
            docker stop app || true
            docker rm app || true

            # ▶️ Subir novo container
            docker run -d -p 80:80 --name app 142280718316.dkr.ecr.us-east-2.amazonaws.com/pedrx12356:latest
